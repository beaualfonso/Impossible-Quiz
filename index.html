<!DOCTYPE html>
<html lang="end">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width:device-width">
        <link rel="stylesheet" href="style.css">
        <title>Quiz Game</title>
    </head>
    <body>
        <div id="container">
            <h1>Welcome to my IMPOSSIBLE Quiz</h1>
            <button id="begin" onclick="startMix()">CLICK TO BEGIN</button>
        </div>
        <div id="question-container">
            <h1 id="question">Which animal can bend around like a baloon</h1>
            <div id="answerBtns">
                <button id="a" onclick="answerQuestion('A')">Alligator</button>
                <button id="b" onclick="answerQuestion('B')">Baloon Animal</button>
                <button id="c" onclick="answerQuestion('C')">Cats</button>
                <button id="d" onclick="answerQuestion('D')">Horses</button>
            </div>
        </div>
        <div id="beginGame">
            <h3>Welcome to the game, game is better played on desktop.</h3>
            <button id="beginGameBtn" onclick="beginGame()">BEGIN GAME</button>
        </div>
        <script src="script.js"></script>
    </body>
</html>

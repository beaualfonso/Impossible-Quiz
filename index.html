<!DOCTYPE html>
<html lang="end">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width:device-width, inital-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Quiz Game</title>
    </head>
    <body>
        <div id="container">
            <h1>Welcome to my IMPOSSIBLE Quiz</h1>
            <button id="begin" onclick="startMix()">CLICK TO BEGIN</button>
        </div>
        <div id="question-container">
            <h1 id="question">What gets wetter the more it dries?</h1>
            <div id="answerBtns">
                <button id="a" onclick="answerQuestion('A')">Sponge</button>
                <button id="b" onclick="answerQuestion('B')">Towel</button>
                <button id="c" onclick="answerQuestion('C')">Water</button>
                <button id="d" onclick="answerQuestion('D')">Soap</button>
            </div>
        </div>
        <div id="beginGame">
            <h3 id="endHead">Welcome to my game. This game can only be played on desktop</h3>
            <button id="beginGameBtn" onclick="beginGame()">BEGIN GAME</button>
        </div>
        <script src="script.js"></script>
    </body>
</html>
